{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Wallets</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>

<h1>Finance Tracker</h1>

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'expenses' %}">Expenses</a>
    <a href="{% url 'categories' %}">Categories</a>
    <a href="{% url 'budget' %}">Budget</a>
</nav>

</header>

<div class="container">

<div class="card">

<h2>Wallets</h2>

<a class="btn" href="{% url 'add_wallet' %}">Add Wallet</a>

</div>

<table>

<tr>
    <th>Name</th>
    <th>Balance</th>
    <th>Actions</th>
</tr>

{% for wallet in wallets %}

<tr>

<td>{{ wallet.name }}</td>
<td>{{ wallet.balance }} ₸</td>

<td>
<a href="{% url 'edit_wallet' wallet.id %}">Edit</a> |
<a href="{% url 'delete_wallet' wallet.id %}">Delete</a>
</td>

</tr>

{% empty %}

<tr>
<td colspan="3">No wallets found.</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
